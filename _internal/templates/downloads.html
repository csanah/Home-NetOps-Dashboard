{% extends "base.html" %}
{% block title %}Downloads{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-4">
  <h2 class="text-xl font-bold">Downloads</h2>
  <button id="refresh-btn"
    class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-medium bg-blue-600 hover:bg-blue-700 text-white transition-colors">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
    Refresh
  </button>
</div>

<!-- Setup banner — hidden by JS once keys are present -->
<div id="setup-banner" class="hidden mb-4 p-4 rounded-lg bg-yellow-50 dark:bg-yellow-900/20 border border-yellow-200 dark:border-yellow-800">
  <div class="flex items-start gap-3">
    <svg class="w-5 h-5 mt-0.5 text-yellow-600 dark:text-yellow-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
    <div class="flex-1">
      <p class="text-sm font-medium text-yellow-700 dark:text-yellow-300">API keys not configured</p>
      <p class="text-xs text-yellow-600 dark:text-yellow-400 mt-1">Click below to auto-detect SABnzbd, Sonarr, Radarr, and Prowlarr API keys from the Media Center VM.</p>
      <button id="setup-btn"
        class="mt-3 px-4 py-2 rounded-lg text-sm font-medium bg-yellow-600 hover:bg-yellow-700 text-white transition-colors">
        Auto-detect API Keys
      </button>
      <span id="setup-status" class="ml-3 text-xs text-yellow-600 dark:text-yellow-400 hidden"></span>
    </div>
  </div>
</div>

<div id="downloads-container"
     hx-get="/downloads/partials"
     hx-trigger="load, every 15s, refresh"
     hx-swap="innerHTML">
  <div class="flex items-center justify-center py-12 text-gray-400">
    <svg class="w-6 h-6 animate-spin mr-2" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
    Loading...
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/downloads.js"></script>
{% endblock %}
