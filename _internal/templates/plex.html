{% extends "base.html" %}
{% block title %}{{ names.plex }}{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-4">
  <h2 class="text-xl font-bold">{{ names.plex }}</h2>
  <button id="refresh-btn"
    class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-medium bg-blue-600 hover:bg-blue-700 text-white transition-colors">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
    Refresh
  </button>
</div>

<!-- Search -->
<div class="mb-4">
  <div class="relative">
    <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
    <input type="text" name="q" placeholder="Search Plex libraries..."
      class="w-full pl-10 pr-4 py-2.5 rounded-xl bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 text-sm text-gray-700 dark:text-gray-200 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-amber-500/40 focus:border-amber-500"
      hx-get="/plex/search"
      hx-trigger="keyup changed delay:400ms"
      hx-target="#search-results"
      hx-swap="innerHTML"
      autocomplete="off">
  </div>
  <div id="search-results"></div>
</div>

<!-- Sessions: fast refresh (15s) -->
<div id="plex-sessions"
     hx-get="/plex/partials/sessions"
     hx-trigger="load, every 15s, refresh"
     hx-swap="innerHTML"
     class="mb-4">
  <div class="flex items-center justify-center py-8 text-gray-400">
    <svg class="w-5 h-5 animate-spin mr-2" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
    Loading sessions...
  </div>
</div>

<!-- Library/Server/Recent/OnDeck: slower refresh (60s) -->
<div id="plex-container"
     hx-get="/plex/partials"
     hx-trigger="load, every 60s, refresh"
     hx-swap="innerHTML">
  <div class="flex items-center justify-center py-12 text-gray-400">
    <svg class="w-6 h-6 animate-spin mr-2" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
    Loading...
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/plex-page.js"></script>
{% endblock %}
