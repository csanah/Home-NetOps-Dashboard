<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome · NetOps</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <meta name="theme-color" content="#2563EB">
  <link rel="stylesheet" href="/static/css/tailwind.min.css">
  <link rel="stylesheet" href="/static/css/custom.css">
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-sm">
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg border border-gray-200 dark:border-gray-700 p-8">
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-14 h-14 rounded-xl bg-blue-100 dark:bg-blue-900/40 mb-4">
          <svg class="w-7 h-7 text-blue-600 dark:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2"/>
          </svg>
        </div>
        <h1 class="text-xl font-bold text-gray-900 dark:text-gray-100">Welcome to NetOps</h1>
        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Set a PIN to get started</p>
      </div>

      {% if error %}
      <div role="alert" class="mb-4 px-4 py-3 rounded-lg bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 text-sm text-red-700 dark:text-red-300">
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" id="setup-form">
        <div class="mb-4">
          <label for="pin" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">PIN</label>
          <input type="password" id="pin" name="pin" required autofocus
            class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700
                   text-gray-900 dark:text-gray-100 text-lg tracking-widest
                   focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
            placeholder="****">
        </div>
        <div class="mb-4">
          <label for="confirm_pin" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Confirm PIN</label>
          <input type="password" id="confirm_pin" name="confirm_pin" required
            class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700
                   text-gray-900 dark:text-gray-100 text-lg tracking-widest
                   focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
            placeholder="****">
        </div>
        <div class="mb-6">
          <label for="port" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
            Port <span class="text-xs text-gray-400">(optional)</span>
          </label>
          <input type="number" id="port" name="port" value="9000"
            class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700
                   text-gray-900 dark:text-gray-100 text-sm
                   focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
        </div>
        <button type="submit"
          class="w-full px-4 py-3 rounded-lg bg-blue-600 hover:bg-blue-700 text-white font-medium text-sm
                 focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 transition">
          Get Started
        </button>
      </form>
    </div>

    <p class="text-center text-xs text-gray-400 dark:text-gray-500 mt-6" id="host-info"></p>
  </div>

  <script src="/static/js/setup.js"></script>
</body>
</html>
