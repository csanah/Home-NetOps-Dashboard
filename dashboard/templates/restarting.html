<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restarting · NetOps</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <meta name="theme-color" content="#2563EB">
  <link rel="stylesheet" href="/static/css/tailwind.min.css">
  <link rel="stylesheet" href="/static/css/custom.css">
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen flex items-center justify-center px-4">

  <div id="restart-config" data-port="{{ new_port }}" data-next-url="{{ next_url }}" hidden></div>

  <div class="w-full max-w-sm text-center">
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg border border-gray-200 dark:border-gray-700 p-8">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-xl bg-blue-100 dark:bg-blue-900/40 mb-4">
        <svg class="w-7 h-7 text-blue-600 dark:text-blue-400 animate-spin" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
      </div>
      <h1 class="text-xl font-bold text-gray-900 dark:text-gray-100 mb-2">Restarting Server</h1>
      <p id="status-text" class="text-sm text-gray-500 dark:text-gray-400">
        {% if new_port %}
          Switching to port {{ new_port }}...
        {% else %}
          Restarting...
        {% endif %}
      </p>
    </div>
  </div>

  <script src="/static/js/restarting.js"></script>
</body>
</html>
