{% extends "base.html" %}
{% block title %}{{ names.overseerr }}{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-4">
  <h2 class="text-xl font-bold">{{ names.overseerr }}</h2>
  <button id="refresh-btn"
    class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-medium bg-blue-600 hover:bg-blue-700 text-white transition-colors">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
    Refresh
  </button>
</div>

<div id="overseerr-container"
     hx-get="/overseerr/partials"
     hx-trigger="load, every 60s, refresh"
     hx-swap="innerHTML">
  <div class="flex items-center justify-center py-12 text-gray-400">
    <svg class="w-6 h-6 animate-spin mr-2" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
    Loading...
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/overseerr-page.js"></script>
{% endblock %}
