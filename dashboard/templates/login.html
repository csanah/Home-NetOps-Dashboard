<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login · NetOps</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <meta name="theme-color" content="#2563EB">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: {} } }
  </script>
  <style>
    input:-webkit-autofill,
    input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0 1000px rgb(31 41 55) inset !important;
      -webkit-text-fill-color: #f3f4f6 !important;
      caret-color: #f3f4f6;
    }
    html:not(.dark) input:-webkit-autofill,
    html:not(.dark) input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0 1000px white inset !important;
      -webkit-text-fill-color: #111827 !important;
      caret-color: #111827;
    }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-sm">
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg border border-gray-200 dark:border-gray-700 p-8">
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-14 h-14 rounded-xl bg-blue-100 dark:bg-blue-900/40 mb-4">
          <svg class="w-7 h-7 text-blue-600 dark:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
        </div>
        <h1 class="text-xl font-bold text-gray-900 dark:text-gray-100">NetOps Dashboard</h1>
        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Enter your PIN to continue</p>
      </div>

      {% if error %}
      <div role="alert" class="mb-4 px-4 py-3 rounded-lg bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 text-sm text-red-700 dark:text-red-300">
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" autocomplete="on">
        <input type="text" name="username" value="admin" autocomplete="username" class="hidden" tabindex="-1" aria-hidden="true">
        <div class="mb-6">
          <label for="pin" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">PIN</label>
          <input type="password" id="pin" name="pin" autocomplete="current-password" required autofocus
            class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700
                   text-gray-900 dark:text-gray-100 text-lg tracking-widest
                   focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
            placeholder="****">
        </div>
        <button type="submit"
          class="w-full px-4 py-3 rounded-lg bg-blue-600 hover:bg-blue-700 text-white font-medium text-sm
                 focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 transition">
          Unlock
        </button>
      </form>
    </div>

    <p class="text-center text-xs text-gray-400 dark:text-gray-500 mt-6" id="host-info"></p>
  </div>

  <script>
    if (localStorage.getItem('theme') === 'light') {
      document.documentElement.classList.remove('dark');
      document.documentElement.classList.add('light');
    }
    document.getElementById('host-info').textContent = window.location.host;
  </script>
</body>
</html>
