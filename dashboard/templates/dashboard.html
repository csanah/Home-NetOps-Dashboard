{% extends "base.html" %}
{% block title %}Dashboard{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-6">
  <div>
    <h2 class="text-2xl font-bold">System Health</h2>
    <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Auto-refreshes every 30 seconds</p>
  </div>
  <button hx-get="/partials/cards" hx-target="#cards-container" hx-swap="innerHTML"
          hx-indicator="#refresh-spinner"
          class="flex items-center gap-2 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium transition-colors">
    <svg id="refresh-spinner" class="w-4 h-4 htmx-indicator animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
    Refresh
  </button>
</div>

<!-- Everything auto-refreshes together -->
<div id="cards-container"
     hx-get="/partials/cards" hx-trigger="every 30s" hx-swap="innerHTML">
  {% include "partials/all_cards.html" %}
</div>
{% endblock %}

{% block scripts %}
<script>
(function() {
  const systemNames = {
    udm: '{{ names.udm }}', proxmox: '{{ names.proxmox }}', ha: '{{ names.ha }}',
    bike: '{{ names.bike }}', nas: '{{ names.nas }}', mqtt: '{{ names.mqtt }}'
  };

  // Request notification permission on load
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }

  let previousStates = {};

  function readCurrentStates() {
    const states = {};
    document.querySelectorAll('[data-system-key]').forEach(el => {
      states[el.dataset.systemKey] = el.dataset.online === 'true';
    });
    return states;
  }

  // Initialize with current state (don't notify on first load)
  previousStates = readCurrentStates();

  // On HTMX swap, compare new states
  document.body.addEventListener('htmx:afterSwap', function(e) {
    if (!e.detail.target || e.detail.target.id !== 'cards-container') return;

    const newStates = readCurrentStates();
    if ('Notification' in window && Notification.permission === 'granted') {
      for (const [key, online] of Object.entries(newStates)) {
        if (previousStates[key] === true && online === false) {
          new Notification('System Down', {
            body: (systemNames[key] || key) + ' went offline',
            tag: 'system-down-' + key
          });
        } else if (previousStates[key] === false && online === true) {
          new Notification('System Recovered', {
            body: (systemNames[key] || key) + ' is back online',
            tag: 'system-up-' + key
          });
        }
      }
    }
    previousStates = newStates;
  });
})();
</script>
{% endblock %}
